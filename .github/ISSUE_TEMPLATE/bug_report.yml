name: Bug report
description: Report something broken in Ark
title: 'bug: '
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Expo Go
        - Android development build
        - iOS development build
        - Web
        - Unknown
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: Pixel 7, Android 15
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Remove private notes, coordinates, documents, or chat content before posting.
