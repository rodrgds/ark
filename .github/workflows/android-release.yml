name: Android Release APKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to build and upload APK assets for
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.event.release.tag_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Build Android release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag_name }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Set up Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-android-release-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-android-release-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Decode Android signing key
        shell: bash
        env:
          ARK_ANDROID_KEYSTORE_BASE64: ${{ secrets.ARK_ANDROID_KEYSTORE_BASE64 }}
          ARK_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ARK_ANDROID_KEYSTORE_PASSWORD }}
          ARK_ANDROID_KEY_ALIAS: ${{ secrets.ARK_ANDROID_KEY_ALIAS }}
          ARK_ANDROID_KEY_PASSWORD: ${{ secrets.ARK_ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          for name in \
            ARK_ANDROID_KEYSTORE_BASE64 \
            ARK_ANDROID_KEYSTORE_PASSWORD \
            ARK_ANDROID_KEY_ALIAS \
            ARK_ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing Android signing secret: %s\n' "${missing[@]}" >&2
            exit 1
          fi

          signing_dir="$RUNNER_TEMP/android-signing"
          mkdir -p "$signing_dir"
          printf '%s' "$ARK_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$signing_dir/ark-release.jks"

          {
            echo "ARK_ANDROID_KEYSTORE_PATH=$signing_dir/ark-release.jks"
            echo "ARK_ANDROID_KEYSTORE_PASSWORD=$ARK_ANDROID_KEYSTORE_PASSWORD"
            echo "ARK_ANDROID_KEY_ALIAS=$ARK_ANDROID_KEY_ALIAS"
            echo "ARK_ANDROID_KEY_PASSWORD=$ARK_ANDROID_KEY_PASSWORD"
            echo "ARK_RELEASE_TAG=${{ steps.release.outputs.tag }}"
          } >> "$GITHUB_ENV"

      - name: Build release APKs
        run: bun run android:release:apks

      - name: Verify release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY"

      - name: Upload APK assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          gh release upload "$TAG_NAME" \
            dist/android-release/*.apk \
            dist/android-release/SHA256SUMS.txt \
            dist/android-release/APK_MANIFEST.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
