name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'fastlane/**'
      - 'fdroid/**'
      - 'assets/images/readme-logo.png'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/docs-pages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'fastlane/**'
      - 'fdroid/**'
      - 'assets/images/readme-logo.png'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Set up Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-docs-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-docs-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build VitePress site
        run: bun run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-docs
          path: docs/.vitepress/dist
          if-no-files-found: error

      - name: Skip Cloudflare deployment
        if: github.event_name != 'pull_request' && (env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '')
        run: echo "Cloudflare secrets are not configured; docs artifact was built but not deployed."

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=ark-docs --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
