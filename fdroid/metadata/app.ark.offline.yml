MaintainerNotes: |-
  Draft metadata only. Ark is an Expo/React Native app and must be prebuilt before the
  fdroiddata build block can be finalized. Expected scanner hot spots are native Expo/RN
  artifacts, llama.rn, ExecuTorch, MapLibre, Skia, valhalla-mobile, and Kiwix/ZIM artifacts.
