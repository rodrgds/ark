AutoName: Ark
Summary: Offline maps, knowledge, notes, and field tools.
Description: |-
  Ark is an offline-first survival computer for mobile.

  It combines downloadable maps, emergency knowledge packs, secure notes and documents,
  local source search, optional on-device AI, cached feeds and weather, recorded tracks,
  and practical sensor tools.

  Ark has no backend account system, no ads, no analytics, and no cloud sync.

